<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N3大魔王討伐クエスト：第10章の魔法陣</title>
<style>
html,body{height:100%;margin:0;background:#1a140c;color:#fdf6e3;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center}
.loading{border:2px solid #e8b53a;padding:18px 22px;border-radius:8px;background:#16235c;box-shadow:0 10px 40px rgba(0,0,0,.35);text-align:center}
</style>
</head>
<body>
<div class="loading">Loading N3 Quest...</div>
<script>
(async()=>{
  const parts=["parts/game-01.b64","parts/game-02.b64","parts/game-03.b64","parts/game-04.b64","parts/game-05.b64","parts/game-06.b64","parts/game-07.b64"];
  const b64=(await Promise.all(parts.map(async path=>{
    const res=await fetch(path,{cache:'no-cache'});
    if(!res.ok) throw new Error(path+' '+res.status);
    return res.text();
  }))).join('').replace(/\s+/g,'');
  const binary=atob(b64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  const html=new TextDecoder('utf-8').decode(bytes);
  document.open();
  document.write(html);
  document.close();
})().catch(err=>{
  document.body.innerHTML='<pre style="white-space:pre-wrap;color:#fdf6e3;background:#531414;padding:16px;border:2px solid #ff9d9d;border-radius:8px">Load failed: '+String(err.message||err)+'</pre>';
});
</script>
</body>
</html>
